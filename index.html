<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenClaw Blog Live Example</title>
    <meta name="description" content="A tiny live blog example deployable on GitHub Pages." />
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 40px auto; max-width: 760px; line-height: 1.7; padding: 0 16px; color: #1f2937; }
      h1 { margin-bottom: 8px; }
      .meta { color: #6b7280; font-size: 14px; margin-bottom: 24px; }
      code { background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }
      .card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; margin-top: 24px; }
    </style>
  </head>
  <body>
    <h1>OpenClaw Blog Live Example</h1>
    <div class="meta">Published: 2026-04-14 · Author: Alan</div>

    <p>
      這是一個最小可用的部落格範例，設計目標是讓 OpenClaw 可以直接維護
      <code>.md/.html</code>、commit、push，並由 GitHub Pages 自動部署。
    </p>

    <div class="card">
      <strong>為什麼這個方案對 OpenClaw 友善？</strong>
      <ul>
        <li>檔案是純文字（好維護、好版本控）</li>
        <li>部署全自動（push 即上線）</li>
        <li>容易擴充（之後可換 Astro/Hugo）</li>
      </ul>
    </div>

    <p style="margin-top: 24px;">
      Next step: 新增第二篇文章並在首頁列出文章索引。
    </p>
  </body>
</html>
